name: Daily Bid Report

on:
  schedule:
    # 08:00 Asia/Seoul = 23:00 UTC on the previous day.
    - cron: "12 0 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore dotenv from SECRET
        env:
          DOTENV_SECRET: ${{ secrets.SECRET }}
        run: |
          if [ -n "$DOTENV_SECRET" ]; then
            printf '%s\n' "$DOTENV_SECRET" > .env
            chmod 600 .env
          fi

      - name: Validate required secrets
        env:
          G2B_SERVICE_KEY: ${{ secrets.G2B_SERVICE_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          def read_dotenv(path: str = ".env") -> dict[str, str]:
              env_path = Path(path)
              if not env_path.exists():
                  return {}
              values = {}
              for raw_line in env_path.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip()
                  value = value.strip().strip("\"'")
                  if key:
                      values[key] = value
              return values

          dotenv = read_dotenv()

          def value(name: str) -> str:
              return (os.environ.get(name) or dotenv.get(name) or "").strip()

          missing = []
          for name in ("G2B_SERVICE_KEY", "SMTP_USERNAME", "SMTP_PASSWORD"):
              if not value(name):
                  missing.append(name)

          if not value("CHATGPT_API_KEY") and not value("OPENAI_API_KEY"):
              missing.append("CHATGPT_API_KEY or OPENAI_API_KEY")

          for name in missing:
              print(f"::error title=Missing GitHub Actions secret::{name} is not configured.")

          sys.exit(1 if missing else 0)
          PY

      - name: Generate and email bid report
        env:
          G2B_SERVICE_KEY: ${{ secrets.G2B_SERVICE_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.4-mini' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
        run: python fetch_yesterday_all.py --send-email

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bid-report
          path: |
            *_발주공고목록.md
            *_발주공고목록.json
          if-no-files-found: ignore
